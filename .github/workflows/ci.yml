name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ '**' ]

env:
  ELIXIR_VERSION: '1.20.0-rc.4'
  OTP_VERSION: '28.4.1'
  MIX_OS_DEPS_COMPILE_PARTITION_COUNT: '4'

jobs:
  deps:
    name: Dependencies
    runs-on: ubuntu-latest

    steps:
      # actions/checkout@v6.0.2
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # erlef/setup-beam@v1.23.0
      - name: Set up Elixir
        uses: erlef/setup-beam@ee09b1e59bb240681c382eb1f0abc6a04af72764
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}
          version-type: strict

      # actions/cache@v5.0.4
      - name: Restore dependencies cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: |
            deps
            _build
          key: v2-${{ runner.os }}-mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            v2-${{ runner.os }}-mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - name: Install dependencies
        run: mix deps.get

      # Compile both envs so downstream jobs get cache hits.
      # Dev: needed by quality job (includes boundary checker).
      # Test: needed by test job (avoids recompilation).
      - name: Compile (dev)
        run: mix compile

      - name: Compile (test)
        run: mix compile
        env:
          MIX_ENV: test

  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: deps

    steps:
      # actions/checkout@v6.0.2
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # erlef/setup-beam@v1.23.0
      - name: Set up Elixir
        uses: erlef/setup-beam@ee09b1e59bb240681c382eb1f0abc6a04af72764
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}
          version-type: strict

      # actions/cache@v5.0.4
      - name: Restore dependencies cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: |
            deps
            _build
          key: v2-${{ runner.os }}-mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            v2-${{ runner.os }}-mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - name: Install dependencies
        run: mix deps.get

      # Dev env compile: catches warnings + runs boundary checker.
      # Near-instant when cache hits from deps job.
      - name: Compile with warnings as errors
        run: mix compile --warnings-as-errors

      - name: Check code formatting
        run: mix format --check-formatted

      - name: Credo
        run: mix credo --min-priority=high

      - name: Typography lint
        run: mix lint_typography

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: deps

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: klass_hero_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MIX_ENV: test

    steps:
      # actions/checkout@v6.0.2
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # erlef/setup-beam@v1.23.0
      - name: Set up Elixir
        uses: erlef/setup-beam@ee09b1e59bb240681c382eb1f0abc6a04af72764
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}
          version-type: strict

      # actions/cache@v5.0.4
      - name: Restore dependencies cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: |
            deps
            _build
          key: v2-${{ runner.os }}-mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            v2-${{ runner.os }}-mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - name: Install dependencies
        run: mix deps.get

      # mix test alias (mix.exs) detects CI env and prepends
      # ecto.create --quiet + ecto.migrate --quiet automatically
      - name: Run tests
        run: mix test

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: deps

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: klass_hero_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MIX_ENV: test

    steps:
      # actions/checkout@v6.0.2
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # erlef/setup-beam@v1.23.0
      - name: Set up Elixir
        uses: erlef/setup-beam@ee09b1e59bb240681c382eb1f0abc6a04af72764
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}
          version-type: strict

      # actions/cache@v5.0.4
      - name: Restore dependencies cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: |
            deps
            _build
          key: v2-${{ runner.os }}-mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            v2-${{ runner.os }}-mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Set up database
        run: mix ecto.create --quiet && mix ecto.migrate --quiet

      - name: Build assets
        run: mix assets.setup && mix assets.build

      # nanasess/setup-chromedriver@v2.4.0
      - name: Install ChromeDriver
        uses: nanasess/setup-chromedriver@c75c3d53d445b96d41dbf2355797b470953c6c30

      - name: Run E2E tests
        run: mix test test/e2e --include e2e

      # actions/upload-artifact@v4.6.2
      - name: Upload E2E screenshots
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: e2e-screenshots
          path: tmp/e2e_screenshots/
          retention-days: 7
