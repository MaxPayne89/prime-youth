name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: ['**']

env:
  MIX_ENV: dev
  ELIXIR_VERSION: '1.20.0-rc.4'
  OTP_VERSION: '28.4.1'
  MIX_OS_DEPS_COMPILE_PARTITION_COUNT: '4'

permissions:
  security-events: write
  contents: read

jobs:
  sobelow:
    name: Sobelow Security Scan
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v6.0.2
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # erlef/setup-beam@v1.23.0
      - name: Set up Elixir
        uses: erlef/setup-beam@ee09b1e59bb240681c382eb1f0abc6a04af72764
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}
          version-type: strict

      # actions/cache@v5.0.4
      - name: Restore dependencies cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Create results directory
        run: mkdir -p results

      - name: Run Sobelow
        run: mix sobelow --config

      # github/codeql-action@v4.34.1
      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@cb06a0a8527b2c6970741b3a0baa15231dc74a4c
        if: always()
        with:
          sarif_file: results/sobelow.sarif

  mix-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v6.0.2
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # erlef/setup-beam@v1.23.0
      - name: Set up Elixir
        uses: erlef/setup-beam@ee09b1e59bb240681c382eb1f0abc6a04af72764
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}
          version-type: strict

      # actions/cache@v5.0.4
      - name: Restore dependencies cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Audit dependencies for vulnerabilities
        run: mix deps.audit
